input {
  beats {
    port => 5044
  }
}

filter {

  # =========================================================================
  # STAGE 1 — PARSING: reconstruir estructura desde texto plano via grok
  # =========================================================================
  # La API emite logs free-form (no JSON). Cada evento tiene un prefijo común
  # y un sufijo distinto según sea éxito o error.
  #
  # Éxito:  ... missing=<csv> prediction=<num> summary="..."
  # Error:  ... msg="..."

  grok {
    match => {
      "message" => [
        # Pattern 1: prediction (éxito) — incluye missing, prediction, summary
        # sqm/br/nbhd aceptan "null" como alternativa cuando la feature falta en el request
        "%{TIMESTAMP_ISO8601:ts} %{LOGLEVEL:level} \[%{DATA:logger}\] req=%{DATA:request_id} endpoint=%{URIPATH:endpoint} status=%{INT:http_status:int} latency=%{NUMBER:latency_ms:float}ms model=%{DATA:model_version} anomaly=%{WORD:anomaly_window} internal=%{WORD:internal} sqm=(?:%{NUMBER:sqm:float}|null) br=(?:%{INT:br:int}|null) nbhd=%{WORD:nbhd_raw} missing=%{DATA:missing_raw} prediction=%{NUMBER:prediction:float} summary=\"%{DATA:summary}\"",

        # Pattern 2: prediction_failed (error) — incluye msg
        "%{TIMESTAMP_ISO8601:ts} %{LOGLEVEL:level} \[%{DATA:logger}\] req=%{DATA:request_id} endpoint=%{URIPATH:endpoint} status=%{INT:http_status:int} latency=%{NUMBER:latency_ms:float}ms model=%{DATA:model_version} anomaly=%{WORD:anomaly_window} internal=%{WORD:internal} sqm=(?:%{NUMBER:sqm:float}|null) br=(?:%{INT:br:int}|null) nbhd=%{WORD:nbhd_raw} msg=\"%{DATA:error_message}\""
      ]
    }
  }

  # Si grok no matcheó (ej. logs de startup de Uvicorn como "INFO:     Waiting for
  # application startup."), descartar el evento — no son eventos de predicción.
  if "_grokparsefailure" in [tags] {
    drop { }
  }

  # event_type derivado del nivel (preservamos el comportamiento del JSON original)
  if [level] == "ERROR" {
    mutate { add_field => { "event_type" => "prediction_failed" } }
  } else if [level] == "INFO" {
    mutate { add_field => { "event_type" => "prediction" } }
  }

  # Conversiones de tipo: grok deja todo como string excepto donde se especifica
  mutate {
    convert => {
      "anomaly_window" => "boolean"
      "internal" => "boolean"
    }
    lowercase => [ "level" ]
  }

  # Reestructurar a nested: features.{square_meters, bedrooms, neighborhood}
  mutate {
    rename => {
      "sqm" => "[features][square_meters]"
      "br" => "[features][bedrooms]"
      "nbhd_raw" => "[features][neighborhood]"
    }
  }

  # nbhd usa %{WORD} que matchea "null" como string; sqm/br ya quedan ausentes via
  # la alternación grok. Para mantener la simetría, dropear neighborhood cuando es "null"
  # — coincide con que el feature aparece en missing_features.
  if [features][neighborhood] == "null" {
    mutate { remove_field => [ "[features][neighborhood]" ] }
  }

  # Reconstruir missing_features como array (solo eventos de éxito)
  if [missing_raw] {
    if [missing_raw] == "none" {
      mutate { add_field => { "missing_features" => [] } }
    } else {
      mutate { split => { "missing_raw" => "," } }
      mutate { rename => { "missing_raw" => "missing_features" } }
    }
    mutate { remove_field => [ "missing_raw" ] }
  }

  # @timestamp desde el campo ts del log (no el de Filebeat)
  date {
    match => [ "ts", "yyyy-MM-dd HH:mm:ss.SSS" ]
    target => "@timestamp"
    remove_field => [ "ts" ]
  }

  # =========================================================================
  # LIMPIEZA — quitar campos de transporte de Filebeat que no aportan valor
  # =========================================================================
  mutate {
    remove_field => [
      "message", "tags", "@version", "agent", "ecs", "input",
      "host", "stream", "container", "docker", "log"
    ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "model-api-logs-%{+yyyy.MM.dd}"
    manage_template => true
    template => "/usr/share/logstash/templates/model-api-logs.json"
    template_name => "model-api-logs"
    template_overwrite => true
  }
}
